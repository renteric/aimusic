##
## nginx.conf - Reverse proxy + static file server for AI-Powered-Music.
##
## In production this container:
##   - Serves the built Vue.js SPA from /usr/share/nginx/html
##   - Proxies all /api/ requests to the Flask backend container
##   - Applies strict security headers (CSP, X-Frame-Options, etc.)
##   - Enables gzip compression
##

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header X-Frame-Options          "DENY"                          always;
    add_header X-Content-Type-Options   "nosniff"                       always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; media-src 'self'; font-src 'self' data:; frame-ancestors 'none';"
        always;

    # Allow large file uploads (audio files up to 250 MB).
    client_max_body_size 250M;

    # ── API proxy → Flask backend ──────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Required for Server-Sent Events (SSE) — disable buffering.
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     600s;
        proxy_send_timeout     600s;
        proxy_connect_timeout  10s;
    }

    # ── Vue.js SPA — HTML5 history routing ────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively; do not cache index.html.
        location ~* \.(js|css|woff2?|ttf|eot|ico|svg|png|jpg|jpeg|gif|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Gzip compression ───────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
}

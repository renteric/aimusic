##
## docker-compose.yml - AI-Music
##
## Services:
##   backend    — FastAPI REST API (Uvicorn, port 5000 internal)
##   frontend   — Vue.js SPA served by nginx (port APP_PORT, default 80)
##   separator  — Stem extraction microservice (FastAPI + ML, port 8000 internal only)
##   transcribe — Whisper transcription service (optional, comment out if unused)
##

services:
  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-music-backend
    image: ai-music-backend:latest
    env_file: .env
    volumes:
      # Media files live on the host — not baked into the image.
      - ./media:/app/media
      # SQLite database persisted on the host.
      - ./data:/app/data
      # User markdown documents persisted on the host.
      - ./docs:/app/docs
    ports:
      - "5000:5000"
    restart: unless-stopped
    networks:
      - app-net
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request;
            urllib.request.urlopen('http://localhost:5000/api/config')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ── Vue.js frontend (nginx) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-music-frontend
    image: ai-music-frontend:latest
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-net

  # ── Separator microservice ───────────────────────────────────────────────────
  # Stem extraction (Demucs · LALAL.AI · AudioSep). Internal only — nginx does
  # not expose this service; the backend API proxies to it via /api/stem/*.
  # Outputs are written directly into media/stems/ (shared with backend).
  #
  # Model weights:
  #   Run `make download-separator` to pre-download all three model files:
  #   AudioSep checkpoint (~1 GB), CLAP encoder weights (~900 MB), Demucs (~85 MB).
  separator:
    build:
      context: ./separator
      dockerfile: Dockerfile
    container_name: ai-music-separator
    image: ai-music-separator:latest
    env_file: .env
    environment:
      MUSEP_OUTPUTS_DIR: /app/outputs
      MUSEP_UPLOADS_DIR: /app/uploads
      MUSEP_MODELS_DIR: /app/models
      # AudioSep checkpoint dir and filename (defaults match download-separator target).
      MUSEP_AUDIOSEP_MODEL_DIR: /app/models/audiosep
      MUSEP_AUDIOSEP_CHECKPOINT: audiosep_base_4M_steps.ckpt
      # Demucs model cache — must match the bind-mount below.
      TORCH_HOME: /app/models/torch
      HF_TOKEN: "${HUGGINGFACE_HUB_API_KEY:-}"
    volumes:
      # Source code bind-mount — separator lives as a sibling directory.
      - ./separator/src:/app/src:ro
      # Stems output → shared with the backend media volume.
      - ./media/stems:/app/outputs
      # Pre-downloaded model weights (./models/separator on host → /app/models in container).
      # Covers AudioSep (audiosep/) and Demucs (torch/hub/) caches.
      - ./models/separator:/app/models
      # CLAP encoder weights required by AudioSep's HTSAT model.
      # maps to the path AudioSep looks for relative to its source root.
      - ./models/separator/clap:/opt/audiosep/checkpoint
    restart: unless-stopped
    networks:
      - app-net
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Whisper transcription service (optional) ─────────────────────────────────
  # Comment out this entire block if you do not need transcription.
  transcribe:
    build:
      context: ./transcribe
      dockerfile: Dockerfile
    image: ai-music-transcribe:latest
    container_name: ai-music-transcribe
    environment:
      # Whisper model weights cache — must match the volume mount below.
      WHISPER_CACHE_DIR: /app/.cache/whisper
    volumes:
      - ./media:/app/media
      - whisper-cache:/app/.cache/whisper
    restart: unless-stopped
    networks:
      - app-net
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request;
            urllib.request.urlopen('http://localhost:9000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── ACE-Step music generation microservice ──────────────────────────────────
  # Generates full songs from text prompts using ACE-Step 1.5.
  # Internal only — the backend proxies requests via /api/music/*.
  #
  # Model weights (~10 GB):
  #   Option A (recommended): pre-download once with `make download-acestep`,
  #     then set ACESTEP_CHECKPOINT_PATH=/app/models/checkpoints in .env.
  #   Option B: leave ACESTEP_CHECKPOINT_PATH empty — downloads on first call.
  acestep:
    build:
      context: ./acestep
      dockerfile: Dockerfile
    container_name: ai-music-acestep
    image: ai-music-acestep:latest
    env_file: .env
    environment:
      ACESTEP_MODEL_SIZE: "${ACESTEP_MODEL_SIZE:-2b}"
      # Pass through from .env — set to /app/models/checkpoints after download.
      ACESTEP_CHECKPOINT_PATH: "${ACESTEP_CHECKPOINT_PATH:-}"
      HF_HOME: /app/models/hf
      HUGGINGFACE_HUB_CACHE: /app/models/hf/hub
      HF_TOKEN: "${HUGGINGFACE_HUB_API_KEY:-}"
    volumes:
      - ./acestep/app.py:/app/app.py
      # Generated audio output — shared with the backend media volume.
      - ./media:/app/media
      # Pre-downloaded model weights (./models/acestep on host → /app/models/checkpoints in container).
      # Empty until `make download-acestep` is run — safe to mount before download.
      - ./models/acestep:/app/models/checkpoints:ro
      # HuggingFace cache for any auto-downloaded assets (persistent across restarts).
      - acestep-hf-cache:/app/models/hf
    restart: unless-stopped
    networks:
      - app-net
    deploy:
      resources:
        limits:
          # Prevent system freeze by capping resource usage.
          # Adjust cpus/memory based on your host capacity.
          cpus: "4"
          memory: 8G
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request;
            urllib.request.urlopen('http://localhost:8001/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

networks:
  app-net:
    driver: bridge

volumes:
  whisper-cache:
  acestep-hf-cache:
